name: Deploy Docs
on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  pages: write

jobs:

  Deploy:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # 3.6.0
      with:
        fetch-depth: 1
    - uses: n1hility/cancel-previous-runs@e709d8e41b16d5d0b8d529d293c5e126c57dc022 #v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Select latest Xcode
      uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd #v1.6.0
      with:
        xcode-version: 16.4

    - name: Install CocoaPods dependencies
      run: pod install

    - name: Determine version to deploy
      id: deploy-version
      run: |
        if [ -n "${{ github.event.release.tag_name }}" ]; then
          VERSION="${{ github.event.release.tag_name }}"
        else
          VERSION=$(grep -E '^\s*s\.version\s*=' Airwallex.podspec | sed -E 's/.*"([^"]+)".*/\1/')
        fi
        echo "Using version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Generate documentation
      run: ./.github/scripts/generate-docs-pods.sh "${{ steps.deploy-version.outputs.version }}"

    - name: Deploy to current version 🚀
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e #v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/html
        destination_dir: ./${{ steps.deploy-version.outputs.version }}

    - name: Deploy to root 🚀
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e #v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/redirect
        keep_files: true
